name: Weekly Dashboard Update
on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Fetch data and build HTML
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SHEET_ID_PHB:   ${{ secrets.SHEET_ID_PHB }}
          SHEET_ID_PHL:   ${{ secrets.SHEET_ID_PHL }}
          SHEET_ID_PHIXC: ${{ secrets.SHEET_ID_PHIXC }}
        run: python scripts/fetch_and_build.py
      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "Auto-update dashboard $(date +'%Y-%m-%d')"
          git push
