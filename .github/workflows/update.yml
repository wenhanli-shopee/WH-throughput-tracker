name: Weekly Dashboard Update

on:
  schedule:
    # Every Monday at 08:00 Singapore time (UTC+8 = 00:00 UTC)
    - cron: '0 0 * * 1'
  # Also allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch GSheet data and build HTML
        env:
          # The Service Account JSON key — stored as a GitHub Secret
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_CREDENTIALS }}
          # The three GSheet IDs — stored as GitHub Secrets
          SHEET_ID_PHB:   ${{ secrets.SHEET_ID_PHB }}
          SHEET_ID_PHL:   ${{ secrets.SHEET_ID_PHL }}
          SHEET_ID_PHIXC: ${{ secrets.SHEET_ID_PHIXC }}
        run: |
          echo "GOOGLE_SERVICE_ACCOUNT_JSON length: ${#GOOGLE_CREDENTIALS}"
          python scripts/fetch_and_build.py

      - name: Commit and push updated HTML
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          # Only commit if there are actual changes
          git diff --staged --quiet || git commit -m "Auto-update dashboard $(date +'%Y-%m-%d')"
          git push
